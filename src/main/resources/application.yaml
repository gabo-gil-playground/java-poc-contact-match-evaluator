server:
  port: 9025
  shutdown: graceful

logging:
  level:
    root: ${APP_LOG_LEVEL:INFO}
    com.example.poc: ${APP_LOG_LEVEL:DEBUG}

spring:
  application:
    name: java-poc-contact-match-eval
  threads:
    virtual-enabled: true # virtual threads (Java 21+) enabled

app:
  contact:
    input:
      path: ${APP_CONTACT_INPUT_PATH:src/main/resources/Code Assessment - Find Duplicates Input - SampleCodecsv (11).csv}
    output:
      path: ${APP_CONTACT_OUTPUT_PATH:src/main/resources/contact-match-result.csv}
